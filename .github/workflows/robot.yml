name: Actualizar Resultados Mundial

on:
  schedule:
    # Este código "0 * * * *" significa: Ejecutar en el minuto 0 de cada hora (Ej: 14:00, 15:00)
    - cron: '0 * * * *'
  workflow_dispatch: # Esto te pone un botón en GitHub para ejecutarlo a mano cuando quieras

jobs:
  ejecutar-python:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descargar el repositorio
      uses: actions/checkout@v4

    - name: 2. Preparar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Podés poner la versión que uses

    - name: 3. Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        # ACÁ PONÉ LAS LIBRERÍAS QUE USE TU SCRIPT (requests, bs4, etc)
        pip install requests

    - name: 4. Ejecutar tu script
      run: python actualizar.py

    - name: 5. Guardar los resultados nuevos en GitHub
      run: |
        git config --global user.name "Robot del Fixture"
        git config --global user.email "robot@fixture.com"
        git add resultados_nube.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "⚽ Resultados actualizados automágicamente" && git push)
